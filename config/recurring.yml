#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  sync_all_accounts:
    class: SyncAllAccountsJob
    schedule: every 6 hours
  sync_scraped_balances:
    class: SyncScrapedBalancesJob
    # Once a day at 04:00 Berlin time. Explicit TZ via Fugit cron zone suffix so
    # it doesn't drift with the app's default timezone.
    schedule: "0 4 * * * Europe/Berlin"
  detect_recurring:
    class: DetectAllRecurringSeriesJob
    queue: default
    # Daily 04:30 Berlin — after the scraped-balance sync, keeps next_expected_on
    # fresh and (phase 2) powers missed-payment alerts.
    schedule: "30 4 * * * Europe/Berlin"
  snapshot_balances:
    class: SnapshotBalancesJob
    # Daily 04:50 Berlin — after the scraped sync (04:00) and detect (04:30) so each
    # day's row reflects the freshest balances. Date.current resolves in the app TZ
    # (UTC); same calendar day at this hour, fine for a once-daily series.
    schedule: "50 4 * * * Europe/Berlin"

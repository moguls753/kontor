# Kontor — FULL PRODUCTION STACK for a TrueNAS SCALE "Custom App".
#
# This is THE file to deploy: it merges the three standalone sidecar stacks
# (compose.scraper.yml = Trade Republic, compose.easybank.yml = easybank /
# Barclaycard DE, compose.paypal.yml = PayPal) into one app so the single Rails
# service can reach ALL scraper sidecars, while each sidecar stays egress-locked
# to its own provider.
#
# The standalone files are NOT deleted — keep them for running an individual
# sidecar or just the egress gate by hand, e.g.:
#   docker compose -f compose.scraper.yml  up --build egress-proxy tr-scraper
#   docker compose -f compose.easybank.yml up --build easybank-egress-proxy easybank-scraper
#   docker compose -f compose.paypal.yml   up --build paypal-egress-proxy paypal-scraper
#
# Topology (STRICT per-provider egress isolation — see docs/trade-republic.md):
#
#                 ┌──────────────── tr-net (internal) ────────────────┐
#                 │  tr-scraper (pytr)  ──HTTPS_PROXY──►  tr-egress-proxy (squid)
#                 │  tr-net ONLY                          tr-net + web │
#                 │  no internet, no resolver             DNS + CONNECT:443
#   kontor ───────┤                                       allowlist:    │──► .traderepublic.com
#   (Rails)       │                                                      │    .awswaf.com
#   tr-net +      └──────────────────────────────────────────────────────┘
#   eb-net +
#   pp-net +      ┌──────────────── eb-net (internal) ────────────────┐
#   web           │  easybank-scraper   ──HTTPS_PROXY──►  easybank-egress-proxy (squid)
#   (only         │  (CloakBrowser)                       eb-net + web │
#    service      │  eb-net ONLY                          DNS + CONNECT:443
#    on all       │  no internet, no resolver             allowlist:    │──► .easybank.de
#    four)   ─────┤                                                      │    .crashninja.net
#                 └──────────────────────────────────────────────────────┘
#                 ┌──────────────── pp-net (internal) ────────────────┐
#                 │  paypal-scraper     ──HTTPS_PROXY──►  paypal-egress-proxy (squid)
#                 │  (CloakBrowser)                       pp-net + web │
#                 │  pp-net ONLY                          DNS + CONNECT:443
#                 │  no internet, no resolver             allowlist:    │──► PayPal +
#                 │  MANUAL SYNC ONLY                                   │    reCAPTCHA
#                 └──────────────────────────────────────────────────────┘
#
#   kontor also talks straight to the open internet on `web` for the LLM
#   categorizer, Enable Banking and GoCardless.
#
# INVARIANTS — a single wrong `networks:` line is a security hole. Preserve exactly:
#   (i)   tr-scraper, easybank-scraper and paypal-scraper share NO network → none can
#         see another.
#   (ii)  each scraper is on its internal net ONLY → no internet except via its own
#         allowlisting squid (HTTPS_PROXY / PROXY_URL point at that squid).
#   (iii) the three proxies keep SEPARATE allowlists/confs (egress-proxy/squid.conf,
#         egress-proxy/easybank-squid.conf, egress-proxy/paypal-squid.conf); no scraper
#         can reach another's proxy.
#   (iv)  kontor is the ONLY service bridging all three internal nets + web.
#
# kontor MUST run with RAILS_ENV=production AND SOLID_QUEUE_IN_PUMA=true or the
# recurring scheduler never runs in Puma (config/puma.rb:38) — that would stop
# the daily TR balance job *and* the 6h account sync.
#
# Required env (see .env.example): RAILS_MASTER_KEY, SCRAPER_SIDECAR_TOKEN,
# EASYBANK_SIDECAR_TOKEN, PAYPAL_SIDECAR_TOKEN, PP_FINGERPRINT.

name: kontor

services:
  # ── Trade Republic egress gate ────────────────────────────────────────────
  # (renamed from `egress-proxy` in compose.scraper.yml for clarity in the
  # merged stack, where a second proxy also exists.)
  tr-egress-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    volumes:
      - ./egress-proxy/squid.conf:/etc/squid/squid.conf:ro
    networks:
      - tr-net
      - web
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/3128"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  tr-scraper:
    # Pulled from GHCR. To build from source instead (development / arm64 / a
    # tag not yet published), add the build override:
    #   docker compose -f compose.yml -f compose.build.yml up -d --build
    image: ghcr.io/moguls753/kontor-tr-scraper:v0.1.1
    restart: unless-stopped
    depends_on:
      tr-egress-proxy:
        condition: service_healthy
    environment:
      SIDECAR_TOKEN: ${SCRAPER_SIDECAR_TOKEN:?set SCRAPER_SIDECAR_TOKEN in .env}
      SESSION_SCRATCH_DIR: /scratch
      # The browser's ONLY egress: point every client at the TR proxy. PROXY_URL
      # is what config.py / CloakBrowser read for the WAF-minting browser; the
      # HTTP(S)_PROXY env vars cover pytr's stdlib requests / curl_cffi /
      # websockets traffic too. NO_PROXY only covers loopback so the healthcheck
      # reaches the local server directly without tunnelling through squid.
      PROXY_URL: http://tr-egress-proxy:3128
      HTTPS_PROXY: http://tr-egress-proxy:3128
      https_proxy: http://tr-egress-proxy:3128
      HTTP_PROXY: http://tr-egress-proxy:3128
      http_proxy: http://tr-egress-proxy:3128
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
    networks:
      - tr-net
    # No route out except the proxy (tr-net is internal). We mint the AWS WAF
    # token with a real stealth Chromium at pairing, so — like easybank-scraper —
    # we drop read_only/cap_drop ALL (a browser writes its profile/temp and
    # spawns sandboxed child processes) and keep the cheap, safe hardening that
    # doesn't break Chromium.
    tmpfs:
      - /scratch
      - /tmp
    # Chromium needs a sane /dev/shm or it crashes renderers under memory pressure.
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request as u,sys; o=u.build_opener(u.ProxyHandler({})); sys.exit(0 if o.open('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── easybank / Barclaycard DE egress gate ─────────────────────────────────
  easybank-egress-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    volumes:
      - ./egress-proxy/easybank-squid.conf:/etc/squid/squid.conf:ro
    networks:
      - eb-net
      - web
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/3128"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  easybank-scraper:
    # Pulled from GHCR (amd64 only — bakes CloakBrowser's Chromium). On arm64, or
    # to build from source, use the build override:
    #   docker compose -f compose.yml -f compose.build.yml up -d --build
    image: ghcr.io/moguls753/kontor-easybank-scraper:v0.1.0
    restart: unless-stopped
    depends_on:
      easybank-egress-proxy:
        condition: service_healthy
    environment:
      SIDECAR_TOKEN: ${EASYBANK_SIDECAR_TOKEN:?set EASYBANK_SIDECAR_TOKEN in .env}
      PROFILE_DIR: /profile
      HEADLESS: "true"
      # The browser's ONLY egress: point every client at the easybank proxy. The
      # PROXY_URL var is what config.py / CloakBrowser read for the browser; the
      # HTTP(S)_PROXY env vars cover any incidental stdlib/library traffic too.
      PROXY_URL: http://easybank-egress-proxy:3128
      HTTPS_PROXY: http://easybank-egress-proxy:3128
      https_proxy: http://easybank-egress-proxy:3128
      HTTP_PROXY: http://easybank-egress-proxy:3128
      http_proxy: http://easybank-egress-proxy:3128
      # NO_PROXY only covers loopback so the healthcheck reaches the local server
      # directly without trying to tunnel through squid.
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
    networks:
      - eb-net
    # Persistent trusted-device profile (rw): this IS the "remembered device" the
    # bank checks, so it must survive restarts or every login faces a fresh mTAN.
    volumes:
      - easybank-profile:/profile
    # Chromium needs a sane /dev/shm or it crashes renderers under memory pressure.
    shm_size: "1gb"
    # Deliberately NOT read_only and NOT cap_drop ALL: a real browser writes its
    # profile/temp and spawns sandboxed child processes. Keep the one cheap, safe
    # hardening that doesn't break Chromium.
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request as u,sys; o=u.build_opener(u.ProxyHandler({})); sys.exit(0 if o.open('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── PayPal egress gate ────────────────────────────────────────────────────
  paypal-egress-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    volumes:
      - ./egress-proxy/paypal-squid.conf:/etc/squid/squid.conf:ro
    networks:
      - pp-net
      - web
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/3128"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  paypal-scraper:
    # Pulled from GHCR (amd64 only — bakes CloakBrowser's Chromium). On arm64, or
    # to build from source, use the build override:
    #   docker compose -f compose.yml -f compose.build.yml up -d --build
    image: ghcr.io/moguls753/kontor-paypal-scraper:v0.1.0
    restart: unless-stopped
    depends_on:
      paypal-egress-proxy:
        condition: service_healthy
    environment:
      SIDECAR_TOKEN: ${PAYPAL_SIDECAR_TOKEN:?set PAYPAL_SIDECAR_TOKEN in .env}
      # Pinned per-install browser fingerprint (required, fail-closed): CloakBrowser
      # randomizes --fingerprint per launch; pin it so PayPal sees ONE stable
      # device across logins (kills the device-trust push step-up re-firing).
      PP_FINGERPRINT: ${PP_FINGERPRINT:?set PP_FINGERPRINT in .env}
      PROFILE_DIR: /profile
      HEADLESS: "true"
      # Whole-/sync ceiling. Must clear login-nav + PUSH_DEADLINE_S + scrape (the
      # push wait is NON-additive, capped at the remaining budget), so it is sized
      # well above PUSH_DEADLINE_S(150), not at 165:
      #   PUSH_DEADLINE_S(150) < SYNC_DEADLINE_S(450) < Rails READ_TIMEOUT(480) < Thruster(510)
      # A full-year backfill paginates several pages, so raise the ceiling and
      # reserve ~240s for the scrape (push wait capped at SYNC_DEADLINE-SCRAPE_RESERVE).
      SYNC_DEADLINE_S: "450"
      SCRAPE_RESERVE_S: "240"
      # Cap on "Mehr" (show-more) pagination clicks. The default (25) truncates a
      # full year of a busy personal account and FAILs LOUD (TransientError -> 503
      # forever); 60 pages comfortably covers a year.
      PAGE_CAP: "60"
      # Human mouse-curves + typing delays. The spike's reCAPTCHA was velocity +
      # robotic + humanize-OFF; on it (plus ~10-min rate-limiting in Rails) the
      # behavioral score stays below the challenge threshold while staying headless.
      HUMANIZE: "true"
      # The browser's ONLY egress: point every client at the paypal proxy. The
      # PROXY_URL var is what config.py / CloakBrowser read for the browser; the
      # HTTP(S)_PROXY env vars cover any incidental stdlib/library traffic too.
      PROXY_URL: http://paypal-egress-proxy:3128
      HTTPS_PROXY: http://paypal-egress-proxy:3128
      https_proxy: http://paypal-egress-proxy:3128
      HTTP_PROXY: http://paypal-egress-proxy:3128
      http_proxy: http://paypal-egress-proxy:3128
      # NO_PROXY only covers loopback so the healthcheck reaches the local server
      # directly without trying to tunnel through squid.
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
    networks:
      - pp-net
    # Persistent warm profile (rw): the warmed/trusted device store. CloakBrowser's
    # launch_persistent_context holds a SingletonLock, so the sidecar opens/closes
    # the browser per request — continuity (the trusted device) comes from THIS
    # on-disk profile, which therefore MUST survive restarts/rebuilds (named volume).
    volumes:
      - paypal-profile:/profile
    # Chromium needs a sane /dev/shm or it crashes renderers under memory pressure.
    shm_size: "1gb"
    # Deliberately NOT read_only and NOT cap_drop ALL: a real browser writes its
    # profile/temp and spawns sandboxed child processes. Keep the one cheap, safe
    # hardening that doesn't break Chromium.
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request as u,sys; o=u.build_opener(u.ProxyHandler({})); sys.exit(0 if o.open('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Rails app — the ONLY service bridging all internal nets + web ──────────
  kontor:
    build: .
    restart: unless-stopped
    depends_on:
      tr-egress-proxy:
        condition: service_healthy
      tr-scraper:
        condition: service_healthy
      easybank-egress-proxy:
        condition: service_healthy
      easybank-scraper:
        condition: service_healthy
      paypal-egress-proxy:
        condition: service_healthy
      paypal-scraper:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      # Required so Solid Queue's recurring scheduler runs inside Puma.
      SOLID_QUEUE_IN_PUMA: "true"
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      # Trade Republic sidecar (reached over tr-net).
      SCRAPER_SIDECAR_URL: http://tr-scraper:8000
      SCRAPER_SIDECAR_TOKEN: ${SCRAPER_SIDECAR_TOKEN:?set SCRAPER_SIDECAR_TOKEN in .env}
      # easybank sidecar (reached over eb-net).
      EASYBANK_SIDECAR_URL: http://easybank-scraper:8000
      EASYBANK_SIDECAR_TOKEN: ${EASYBANK_SIDECAR_TOKEN:?set EASYBANK_SIDECAR_TOKEN in .env}
      # PayPal sidecar (reached over pp-net). MANUAL-SYNC-ONLY; the sync_paypal
      # action blocks while the user approves the device push on their phone AND
      # the post-approval scrape runs, so the whole timeout chain must clear
      # login-nav + PUSH_DEADLINE_S(150) + scrape — NOT just 150. The sidecar's
      # SYNC_DEADLINE_S(450) sizes that; the chain below stays above it:
      #   PUSH_DEADLINE_S(150) < sidecar SYNC_DEADLINE_S(450) < Rails READ_TIMEOUT(480)
      #   < Thruster idle/write(510). Thruster (./bin/thrust, the prod CMD) otherwise
      #   cuts the blocking request at its ~30/60s default idle/write timeouts.
      PAYPAL_SIDECAR_URL: http://paypal-scraper:8000
      PAYPAL_SIDECAR_TOKEN: ${PAYPAL_SIDECAR_TOKEN:?set PAYPAL_SIDECAR_TOKEN in .env}
      PAYPAL_READ_TIMEOUT: "480"
      THRUSTER_HTTP_IDLE_TIMEOUT: "510"
      THRUSTER_HTTP_WRITE_TIMEOUT: "510"
      THRUSTER_HTTP_READ_TIMEOUT: "510"
      # The blocking sync_paypal holds 1 Puma thread for up to ~7.5 min (the full
      # SYNC_DEADLINE_S(450) window). With RAILS_MAX_THREADS=5 and no
      # worker_timeout, the Rails-side ~10-min rate limiter (stamped at request
      # start) keeps this single-user-serialized so it can't starve the pool.
      # Raise the floor so a parallel page load during a push-block still has
      # threads.
      RAILS_MAX_THREADS: "5"
    volumes:
      - kontor_storage:/rails/storage
    ports:
      - "3000:80"
    networks:
      - tr-net
      - eb-net
      - pp-net
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  # Internal: no gateway to the host/internet, IPv6 disabled so there is no
  # alternative route for the scraper to slip out on. tr-net, eb-net and pp-net
  # are distinct so the three scrapers never share a network (invariant i).
  tr-net:
    internal: true
    enable_ipv6: false
  eb-net:
    internal: true
    enable_ipv6: false
  pp-net:
    internal: true
    enable_ipv6: false
  # Internet-facing bridge: kontor (EB/GC/LLM) and each proxy's upstream.
  web:
    driver: bridge

volumes:
  kontor_storage:
  easybank-profile:
  # PayPal warm/trusted-device profile. Named (not anonymous) so a rebuild/redeploy
  # NEVER wipes it — losing it re-fires the device push step-up on the next login.
  paypal-profile:

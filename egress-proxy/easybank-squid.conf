# Egress allowlist for the easybank / Barclaycard DE scraper sidecar.
#
# SEPARATE from the Trade Republic egress (egress-proxy/squid.conf): a different
# bank means a different allowlist, kept apart so neither stack can reach the
# other's hosts. Only HTTPS CONNECT tunnels to easybank and its device-
# fingerprinting host are permitted; every other destination — and every
# plain-HTTP request — is denied. squid does DNS here, on the internet-facing
# `web` network; the easybank-scraper container has no resolver and no route of
# its own, so this allowlist is the browser's only path off the box.

http_port 3128

acl SSL_ports port 443
acl CONNECT method CONNECT

# banking.easybank.de (the VeriChannel app + its JSON flow endpoints) and
# crashninja.net (the JS device-fingerprint / fraud SDK the bank's page loads;
# blocking it makes the session look bot-like and can force an mTAN). An
# easybank-only allowlist is not enough to look like a trusted device.
acl allowed_domains dstdomain .easybank.de .crashninja.net

# Allow only CONNECT to :443 to the allowlisted domains; deny everything else
# (including any plain-HTTP forward-proxy request, which falls through to deny).
http_access deny CONNECT !SSL_ports
http_access allow CONNECT allowed_domains
http_access deny all

# Log every request — including the CONNECT target host — so an egress audit can
# assert that nothing but the allowlisted hosts was contacted. Written to squid's
# own (proxy-writable) log dir; read it with:
#   docker compose -f compose.easybank.yml exec easybank-egress-proxy cat /var/log/squid/access.log
logformat kontor %tl %>a %Ss/%03>Hs %rm %ru %Sh/%<a
access_log stdio:/var/log/squid/access.log kontor

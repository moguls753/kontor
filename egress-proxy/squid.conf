# Egress allowlist for the Trade Republic scraper sidecar.
#
# Only HTTPS CONNECT tunnels to Trade Republic and the AWS WAF token host are
# permitted; every other destination — and every plain-HTTP request — is denied.
# squid performs DNS resolution here, on the internet-facing `web` network; the
# tr-scraper container itself has no resolver and no route of its own, so this
# allowlist is the sidecar's only path off the box.

http_port 3128

acl SSL_ports port 443
acl CONNECT method CONNECT

# Trade Republic API/app + the AWS WAF token host (login mints an aws-waf-token
# from *.awswaf.com; see pytr/api.py and pytr/awswaf/). A TR-only allowlist
# cannot complete login.
acl allowed_domains dstdomain .traderepublic.com .awswaf.com

# Allow only CONNECT to :443 to the allowlisted domains; deny everything else
# (including any plain-HTTP forward-proxy request, which falls through to deny).
http_access deny CONNECT !SSL_ports
http_access allow CONNECT allowed_domains
http_access deny all

# Log every request — including the CONNECT target host — so the egress audit
# can assert that nothing but the allowlisted hosts was contacted. Written to
# squid's own (proxy-writable) log dir; read it with:
#   docker compose -f compose.scraper.yml exec egress-proxy cat /var/log/squid/access.log
logformat kontor %tl %>a %Ss/%03>Hs %rm %ru %Sh/%<a
access_log stdio:/var/log/squid/access.log kontor

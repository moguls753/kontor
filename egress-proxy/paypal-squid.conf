# Egress allowlist for the PayPal personal-account scraper sidecar.
#
# SEPARATE from the Trade Republic (squid.conf) and easybank (easybank-squid.conf)
# egresses: a different provider means a different allowlist, kept apart so no
# stack can reach another's hosts. Only HTTPS CONNECT tunnels to PayPal and the
# reCAPTCHA hosts its page loads are permitted; every other destination — and
# every plain-HTTP request — is denied. squid does DNS here, on the internet-
# facing `web` network; the paypal-scraper container has no resolver and no route
# of its own, so this allowlist is the browser's only path off the box.

http_port 3128

acl SSL_ports port 443
acl CONNECT method CONNECT

# PayPal's web app + its JSON/asset endpoints (paypal.com, the paypalobjects.com
# static CDN, the honey CDN that serves merchant logos in the activity list) and
# Google reCAPTCHA. We deliberately keep the reCAPTCHA hosts narrow: the whole
# `.google.com` subtree is NOT allowlisted (it would be a wide exfiltration
# channel — mail, drive, docs, scripts all live under google.com). reCAPTCHA v2
# loads from recaptcha.net + gstatic.com; if a challenge insists on the legacy
# api2 host, allow ONLY the exact host www.google.com (no leading dot => not the
# whole tree), never `.google.com`.
#
# TODO (CONFIRM AT DEPLOY — §8.1 / §10 pre-flight): PayPal loads a JS device-
# fingerprint / fraud SDK (the `crashninja.net` analogue easybank had to allow).
# Its host is UNKNOWN until we run one login through this squid with `http_access
# deny all` logging every denied CONNECT, then add the minimal real host(s) here.
# Blocking it makes the session look bot-like and can force the push step-up or a
# captcha. Until confirmed, leave the placeholder line below commented out.
acl allowed_domains dstdomain .paypal.com .paypalobjects.com .joinhoney.com
acl allowed_domains dstdomain .recaptcha.net .gstatic.com
# Exact host only (no leading dot) — the legacy reCAPTCHA api2 anchor/iframe. This
# is NOT `.google.com`: it pins the single host, not the subtree.
acl allowed_domains dstdomain www.google.com
# acl allowed_domains dstdomain .TODO-paypal-device-sdk-host   # confirm via deny-all-log at deploy

# Allow only CONNECT to :443 to the allowlisted domains; deny everything else
# (including any plain-HTTP forward-proxy request, which falls through to deny).
http_access deny CONNECT !SSL_ports
http_access allow CONNECT allowed_domains
http_access deny all

# Log every request — including the CONNECT target host — so an egress audit can
# assert that nothing but the allowlisted hosts was contacted, AND so the deploy
# pre-flight can read off the device-SDK host to allowlist. Written to squid's own
# (proxy-writable) log dir; read it with:
#   docker compose -f compose.paypal.yml exec paypal-egress-proxy cat /var/log/squid/access.log
logformat kontor %tl %>a %Ss/%03>Hs %rm %ru %Sh/%<a
access_log stdio:/var/log/squid/access.log kontor
